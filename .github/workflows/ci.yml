name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-flake:
    name: Check flake
    runs-on: ubuntu-latest
    steps:
      - name: Configure runner defaults
        run: |
          git config --global init.defaultBranch main
          sudo sed -i -E \
            -e 's/^[#[:space:]]*SYS_UID_MAX[[:space:]]+.*/SYS_UID_MAX 39999/' \
            -e 's/^[#[:space:]]*SYS_GID_MAX[[:space:]]+.*/SYS_GID_MAX 39999/' \
            /etc/login.defs

      - name: Checkout repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action v31.10.6
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            trusted-users = root runner

      - name: Check flake
        run: |
          # For CI, we need to ensure hardware configuration exists
          if [ ! -f /etc/nixos/hardware-configuration.nix ]; then
            echo "Creating dummy hardware configuration for CI..."
            sudo mkdir -p /etc/nixos
            sudo tee /etc/nixos/hardware-configuration.nix > /dev/null << 'EOF'
          { config, lib, pkgs, modulesPath, ... }:
          {
            fileSystems."/" = {
              device = "/dev/disk/by-label/nixos";
              fsType = "ext4";
            };
          }
          EOF
          fi
          nix flake check --impure --all-systems --no-build

  lint-and-format:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - name: Configure runner defaults
        run: |
          git config --global init.defaultBranch main
          sudo sed -i -E \
            -e 's/^[#[:space:]]*SYS_UID_MAX[[:space:]]+.*/SYS_UID_MAX 39999/' \
            -e 's/^[#[:space:]]*SYS_GID_MAX[[:space:]]+.*/SYS_GID_MAX 39999/' \
            /etc/login.defs

      - name: Checkout repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action v31.10.6
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            trusted-users = root runner

      - name: Run pre-commit checks
        run: |
          nix build --impure .#checks.x86_64-linux.pre-commit-check

  build:
    name: Build NixOS configurations
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: [eto, virgil]
    steps:
      - name: Configure runner defaults
        run: |
          git config --global init.defaultBranch main
          sudo sed -i -E \
            -e 's/^[#[:space:]]*SYS_UID_MAX[[:space:]]+.*/SYS_UID_MAX 39999/' \
            -e 's/^[#[:space:]]*SYS_GID_MAX[[:space:]]+.*/SYS_GID_MAX 39999/' \
            /etc/login.defs

      - name: Checkout repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action v31.10.6
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            trusted-users = root runner

      - name: Create dummy hardware configuration
        run: |
          sudo mkdir -p /etc/nixos
          sudo tee /etc/nixos/hardware-configuration.nix > /dev/null << 'EOF'
          { config, lib, pkgs, modulesPath, ... }:
          {
            boot.initrd.availableKernelModules = [ "virtio_pci" "virtio_blk" ];
            boot.kernelModules = [ ];

            fileSystems."/" = {
              device = "/dev/disk/by-label/nixos";
              fsType = "ext4";
            };
          }
          EOF

      - name: Build ${{ matrix.host }} configuration (dry-run)
        run: |
          nix build --dry-run --impure \
            .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
