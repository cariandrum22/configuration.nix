name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-flake:
    name: Check flake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Nix
        # DeterminateSystems/nix-installer-action v22
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Nix cache
        # DeterminateSystems/magic-nix-cache-action v13
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39

      - name: Check flake
        run: |
          # For CI, we need to ensure hardware configuration exists
          if [ ! -f /etc/nixos/hardware-configuration.nix ]; then
            echo "Creating dummy hardware configuration for CI..."
            sudo mkdir -p /etc/nixos
            sudo tee /etc/nixos/hardware-configuration.nix > /dev/null << 'EOF'
          { config, lib, pkgs, modulesPath, ... }:
          {
            fileSystems."/" = {
              device = "/dev/disk/by-label/nixos";
              fsType = "ext4";
            };
          }
          EOF
          fi
          nix flake check --impure

  lint-and-format:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Nix
        # DeterminateSystems/nix-installer-action v22
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Nix cache
        # DeterminateSystems/magic-nix-cache-action v13
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39

      - name: Run pre-commit checks
        run: |
          nix build --impure .#checks.x86_64-linux.pre-commit-check

  build:
    name: Build NixOS configurations
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: [eto, virgil]
    steps:
      - name: Checkout repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Nix
        # DeterminateSystems/nix-installer-action v22
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Nix cache
        # DeterminateSystems/magic-nix-cache-action v13
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39

      - name: Create dummy hardware configuration
        run: |
          sudo mkdir -p /etc/nixos
          sudo tee /etc/nixos/hardware-configuration.nix > /dev/null << 'EOF'
          { config, lib, pkgs, modulesPath, ... }:
          {
            boot.initrd.availableKernelModules = [ "virtio_pci" "virtio_blk" ];
            boot.kernelModules = [ ];

            fileSystems."/" = {
              device = "/dev/disk/by-label/nixos";
              fsType = "ext4";
            };
          }
          EOF

      - name: Build ${{ matrix.host }} configuration (dry-run)
        run: |
          nix build --dry-run --impure \
            .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
